<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز الارتقاء الجامعي</title>
  
  <!-- SEO -->
  <meta name="description" content="مركز الارتقاء الجامعي - سكن طلابي وأنشطة إبداعية وتنموية">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Lenis for smooth scroll -->
  <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

</head>
<body>

  <header>
    <nav class="container-custom">
      <div class="logo cursor-pointer" onclick="navigate('home')">
        <img src="assets/logo.svg" alt="Logo">
      </div>

      <ul class="nav-links">
        <li><a href="#" onclick="navigate('home')">الرئيسية</a></li>
        <li><a href="#Welcome" onclick="navigate('#Welcome')">من نحن</a></li>
        <li><a href="#contact">التواصل</a></li>
        <li><a href="#" onclick="navigate('news')">الأخبار</a></li>
      </ul>

      <button class="menu-btn" onclick="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div style="display: none; display: md-block;" class="hidden md:block">
        <button class="btn btn-primary">سجل الآن</button>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu">
      <a href="#" onclick="navigate('home')">الرئيسية</a>
      <a href="#Welcome" onclick="navigate('#Welcome')">من نحن</a>
      <a href="#contact">التواصل</a>
      <a href="#" onclick="navigate('news')">الأخبار</a>
    </div>
  </header>

  <div id="app">
    <!-- App content will be rendered here by main.js -->
  </div>

  <script src="js/main.js"></script>

</body>
</html>
